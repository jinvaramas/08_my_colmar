<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Colmar Academy</title>
</head>
<!-- == HEADER == -->
<!-- == มายจะใช้ Tailwind ในการสร้างเว็บครั้งนีโดยแยกสัดส่วนของเว็บจากด้านบนลงไปล่าง == -->
<!-- == หลักคิดแรกเลยคือทำส่วนหัวแรกก่อนก็คือ header โดยเลือกสี BG และ text ใกล้เคียง == -->
<!-- == และที่เห็นสำคัญเลยคือ ตอนเป็น desktop จะเห็นหมวดเมนูเป็นตัวหนังสือ แต่ตอนดึงเข้าจะต้องเป็นไอคอน == -->
<!-- == ซึ่งต้องจัดระยะห่างของ padding และ flex ให้ถูกต้องตามเลย์เอ้า จัดความสูงเป็นh-16(64px) == -->
<!-- == สำหรับตัว HEADER ต้องสร้าง box ใน container โดยใช้ flex แยกออกเป็นลูก 2 ฝั่ง == -->

<body class="bg-gray-100 text-gray-800">

<!-- ================= HEADER ================= -->
<header class="bg-white">
  <div class="flex items-center px-6 h-16">

    <!-- logo (desktop) -->
    <div class="hidden md:flex items-center gap-2">
      <img src="/ic-logo.svg" class="h-8" />
      <span class="font-bold">
        COLMAR <span class="text-gray-400">ACADEMY</span>
      </span>
    </div>

    <!-- desktop menu -->
    <nav class="hidden md:flex gap-6 ml-auto">
      <a href="#">On campus</a>
      <a href="#">Online</a>
      <a href="#">For companies</a>
      <a href="#">Sign in</a>
    </nav>

    <!-- mobile menu -->
    <nav class="md:hidden w-full">
      <ul class="flex justify-center items-center gap-16">
        <li><img src="/ic-logo.svg" class="h-6"></li>
        <li><img src="/ic-on-campus.svg" class="h-6"></li>
        <li><img src="/ic-online.svg" class="h-6"></li>
        <li><img src="/ic-login.svg" class="h-6"></li>
      </ul>
    </nav>

  </div>
</header>

<!-- ================= HERO ================= -->
<!-- == ในส่วน banner มายจะแบ่งเป็น 2 items ใน container โดยแบ่งเป็นฝั่งซ้าย(ไอเทม1)คือรูป ฝั่งขวา(ไอเทม2) เนื้อหา+ปุ่มกด == -->
<!-- == และแบ่งเป็นการแสดงผล 2 แบบคือ 1.ทาง desktop 2. ทาง mobile == -->
<!-- == desktop มายจะกำหนดรูปเป็น 60% และขอบ 24px บน32px ระยะห่างขอบขวาต้องห่างกับฝั่งขวา 24px และในส่วนฝั่งขวาจะสร้างปุ่มกด == -->
<!-- == mobile มายจะกำหนดให้การแสดงผลขอบล่างระหว่างตัวหนังสือ ระหว่างปุ่ม และขอบล่าง == -->


<!-- ================= HERO ================= -->
<section class="flex flex-col md:flex-row bg-gray-200 px-6 py-8 md:py-8">

  <!-- LEFT (60%) -->
  <div class="md:basis-3/5">
    <img src="/banner.jpg" class="w-full" />
  </div>

  <!-- RIGHT (40%) -->
  <div class="md:basis-2/5 flex flex-col justify-center px-4 py-8 md:px-0 md:py-0 md:pl-8">

    <h1 class="text-3xl md:text-5xl font-bold leading-tight mb-8">
      Learn something<br class="hidden md:block" />
      new everyday
    </h1>

    <p class="text-gray-600 mb-6">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>

    <a href="#" class="bg-gray-700 text-white text-center py-2">
      Start here
    </a>

  </div>

</section>
